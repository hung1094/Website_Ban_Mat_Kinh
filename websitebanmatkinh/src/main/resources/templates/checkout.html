<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán | GENTLE GLASSES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #000000;
      --border-color: #e5e5e5;
      --subtle-gray: #f9f9f9;
      --radius-lg: 20px;
      --radius-sm: 12px;
    }

    body {
      background-color: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--primary-dark);
      -webkit-font-smoothing: antialiased;
    }

    /* Tiêu đề trang */
    .checkout-header {
      padding: 60px 0 30px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 50px;
    }
    .checkout-header h1 {
      font-weight: 600;
      letter-spacing: -1px;
      font-size: 2.2rem;
    }

    /* Form Styling */
    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      color: #444;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-color);
      margin-left: 20px;
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #666;
    }

    .form-control {
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: #fff;
    }
    .form-control:focus {
      box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
      border-color: var(--primary-dark);
    }

    /* Payment Options */
    .payment-option {
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .btn-check:checked + .payment-option {
      border-color: var(--primary-dark);
      background-color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
    .payment-option i, .payment-option img {
      margin-bottom: 12px;
      filter: grayscale(0.5);
      transition: 0.3s;
    }
    .btn-check:checked + .payment-option i, .btn-check:checked + .payment-option img {
      filter: grayscale(0);
      transform: scale(1.1);
    }

    /* Order Summary Box */
    .order-summary-box {
      background: var(--subtle-gray);
      padding: 35px;
      border-radius: var(--radius-lg);
      position: sticky;
      top: 100px;
    }

    .product-item {
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }
    .product-item:last-child { border-bottom: none; }

    .product-img {
      width: 65px;
      height: 65px;
      object-fit: contain;
      background: white;
      border-radius: var(--radius-sm);
      padding: 5px;
    }

    /* Nút đặt hàng */
    .btn-black {
      background: var(--primary-dark);
      color: #fff;
      border: none;
      padding: 18px;
      font-weight: 700;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      transition: 0.3s;
      width: 100%;
      margin-top: 25px;
    }
    .btn-black:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .total-row {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1.5px dashed var(--border-color);
    }
  </style>
</head>
<body>

<div class="container pb-5">
  <header class="checkout-header d-flex justify-content-between align-items-end">
    <h1 class="mb-0 text-uppercase">Thanh toán</h1>
    <a th:href="@{/cart}" class="text-dark text-decoration-none small fw-bold">
      <i class="bi bi-arrow-left"></i> QUAY LẠI GIỎ HÀNG
    </a>
  </header>

  <form th:action="@{/checkout/process}" method="post">
    <div class="row g-5">
      <div class="col-lg-7">
        <h4 class="section-title">Thông tin giao hàng</h4>

        <div class="row g-4">
          <div class="col-12">
            <label class="form-label">Họ và tên</label>
            <input type="text" name="customerName" class="form-control"
                   th:value="${defaultAddress != null ? defaultAddress.receiverName : user.fullName}"
                   placeholder="Nhập tên người nhận" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Số điện thoại</label>
            <input type="tel" name="phone" class="form-control"
                   th:value="${defaultAddress != null ? defaultAddress.phone : user.phoneNumber}"
                   placeholder="Số điện thoại nhận hàng" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Tỉnh / Thành phố</label>
            <input type="text" name="city" class="form-control"
                   th:value="${defaultAddress != null ? defaultAddress.city : ''}"
                   placeholder="Ví dụ: Hà Nội" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Quận / Huyện</label>
            <input type="text" name="district" class="form-control"
                   th:value="${defaultAddress != null ? defaultAddress.district : ''}"
                   placeholder="Nhập quận/huyện" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Phường / Xã</label>
            <input type="text" name="ward" class="form-control"
                   th:value="${defaultAddress != null ? defaultAddress.ward : ''}"
                   placeholder="Nhập phường/xã" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Địa chỉ chi tiết</label>
            <input type="text" name="detailAddress" class="form-control"
                   th:value="${defaultAddress != null ? defaultAddress.detailAddress : ''}"
                   placeholder="Số nhà, tên đường..." required>
          </div>
        </div>

        <h4 class="section-title mt-5">Phương thức thanh toán</h4>
        <div class="row g-3">
          <div class="col-md-6">
            <input type="radio" class="btn-check" name="paymentMethod" id="cod" value="COD" checked autocomplete="off">
            <label class="payment-option" for="cod">
              <i class="bi bi-truck fs-3 text-dark"></i>
              <span class="fw-bold small">THANH TOÁN KHI NHẬN HÀNG (COD)</span>
              <small class="text-muted mt-1" style="font-size: 0.7rem;">Nhận hàng rồi mới trả tiền</small>
            </label>
          </div>
          <div class="col-md-6">
            <input type="radio" class="btn-check" name="paymentMethod" id="momo" value="MOMO" autocomplete="off">
            <label class="payment-option" for="momo">
              <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" width="35" alt="momo">
              <span class="fw-bold small">VÍ ĐIỆN TỬ MOMO</span>
              <small class="text-muted mt-1" style="font-size: 0.7rem;">Thanh toán nhanh qua ứng dụng</small>
            </label>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="order-summary-box shadow-sm">
          <h4 class="section-title">Tóm tắt đơn hàng</h4>

          <div class="order-items mb-4">
            <div th:each="item : ${cartItems}" class="product-item d-flex align-items-center justify-content-between">
              <div class="d-flex align-items-center">
                <div class="position-relative me-3">
                  <img th:src="${item.imageUrl}" class="product-img border">
                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark"
                        style="font-size: 0.65rem;" th:text="${item.quantity}">1</span>
                </div>
                <div class="small fw-bold text-uppercase" style="max-width: 160px;" th:text="${item.name}"></div>
              </div>
              <div class="small fw-bold" th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
            </div>
          </div>

          <div class="small">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Tạm tính</span>
              <span class="fw-bold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Phí vận chuyển</span>
              <span class="text-success fw-bold">MIỄN PHÍ</span>
            </div>
            <div class="d-flex justify-content-between total-row">
              <span class="text-uppercase">Tổng cộng</span>
              <span th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
            </div>
          </div>

          <button type="submit" class="btn-black shadow">
            HOÀN TẤT ĐẶT HÀNG
          </button>

          <div class="mt-4 text-center opacity-75">
            <i class="bi bi-shield-lock-fill me-1"></i>
            <span style="font-size: 0.75rem;">Thanh toán an toàn & bảo mật</span>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
