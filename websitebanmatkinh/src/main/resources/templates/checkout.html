<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Thanh toán - GENTLE GLASSES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
    .checkout-card { border: none; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); background: white; }
    .product-item { border-bottom: 1px solid #f1f1f1; padding: 12px 0; }
    .product-item:last-child { border-bottom: none; }
    .payment-option {
      border: 2px solid #eee; border-radius: 12px; padding: 15px;
      cursor: pointer; transition: 0.3s; position: relative;
    }
    .payment-option:hover { border-color: #ee4d2d; }
    .btn-check:checked + .payment-option { border-color: #ee4d2d; background-color: #fdf2f0; }
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #222; }
    .form-label { font-size: 0.75rem; font-weight: 700; color: #666; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="mb-4">
    <a th:href="@{/cart}" class="text-dark text-decoration-none small fw-bold">
      <i class="bi bi-chevron-left"></i> QUAY LẠI GIỎ HÀNG
    </a>
  </div>

  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card checkout-card p-4">
        <h4 class="section-title"><i class="bi bi-geo-alt-fill text-danger me-2"></i>THÔNG TIN VẬN CHUYỂN</h4>

        <form th:action="@{/checkout/process}" method="post">
          <div class="row g-3">
            <div class="col-md-12">
              <label class="form-label text-uppercase">Họ tên người nhận</label>
              <input type="text" name="customerName" class="form-control form-control-lg fs-6"
                     th:value="${defaultAddress != null ? defaultAddress.receiverName : user.fullName}"
                     placeholder="Nhập họ tên..." required>
            </div>

            <div class="col-md-6">
              <label class="form-label text-uppercase">Số điện thoại</label>
              <input type="tel" name="phone" class="form-control form-control-lg fs-6"
                     th:value="${defaultAddress != null ? defaultAddress.phone : user.phoneNumber}"
                     placeholder="Số điện thoại nhận hàng..." required>
            </div>

            <div class="col-md-6">
              <label class="form-label text-uppercase">Tỉnh / Thành phố</label>
              <input type="text" name="city" class="form-control form-control-lg fs-6"
                     th:value="${defaultAddress != null ? defaultAddress.city : ''}"
                     placeholder="Ví dụ: Hà Nội" required>
            </div>

            <div class="col-md-6">
              <label class="form-label text-uppercase">Quận / Huyện</label>
              <input type="text" name="district" class="form-control form-control-lg fs-6"
                     th:value="${defaultAddress != null ? defaultAddress.district : ''}"
                     placeholder="Ví dụ: Cầu Giấy" required>
            </div>

            <div class="col-md-6">
              <label class="form-label text-uppercase">Phường / Xã</label>
              <input type="text" name="ward" class="form-control form-control-lg fs-6"
                     th:value="${defaultAddress != null ? defaultAddress.ward : ''}"
                     placeholder="Ví dụ: Dịch Vọng" required>
            </div>

            <div class="col-12">
              <label class="form-label text-uppercase">Địa chỉ chi tiết</label>
              <textarea name="detailAddress" class="form-control fs-6" rows="2"
                        th:text="${defaultAddress != null ? defaultAddress.detailAddress : ''}"
                        placeholder="Số nhà, tên đường..." required></textarea>
            </div>
          </div>

          <h4 class="section-title mt-5"><i class="bi bi-credit-card-2-back-fill text-primary me-2"></i>PHƯƠNG THỨC THANH TOÁN</h4>
          <div class="row g-3">
            <div class="col-md-6">
              <input type="radio" class="btn-check" name="paymentMethod" id="cod" value="COD" checked autocomplete="off">
              <label class="payment-option d-flex flex-column align-items-center justify-content-center text-center h-100" for="cod">
                <i class="bi bi-cash-stack fs-2 mb-2 text-success"></i>
                <span class="fw-bold small">Tiền mặt (COD)</span>
                <small class="text-muted" style="font-size: 0.7rem;">Thanh toán khi nhận hàng</small>
              </label>
            </div>
            <div class="col-md-6">
              <input type="radio" class="btn-check" name="paymentMethod" id="momo" value="MOMO" autocomplete="off">
              <label class="payment-option d-flex flex-column align-items-center justify-content-center text-center h-100" for="momo">
                <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" width="35" class="mb-2" alt="momo">
                <span class="fw-bold small">Ví điện tử MoMo</span>
                <small class="text-muted" style="font-size: 0.7rem;">Thanh toán trực tuyến</small>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-danger btn-lg w-100 mt-5 py-3 fw-bold rounded-pill shadow-sm" style="background-color: #ee4d2d; border: none;">
            ĐẶT HÀNG NGAY
          </button>
        </form>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card checkout-card p-4 sticky-top" style="top: 20px;">
        <h4 class="section-title">ĐƠN HÀNG CỦA BẠN</h4>

        <div class="order-summary mb-4" style="max-height: 400px; overflow-y: auto;">
          <div th:each="item : ${cartItems}" class="product-item d-flex align-items-center">
            <div class="position-relative">
              <img th:src="${item.imageUrl}" class="rounded border" width="70" height="70" style="object-fit: cover;">
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-secondary"
                    style="font-size: 0.7rem;" th:text="${item.quantity}">1</span>
            </div>
            <div class="ms-4 flex-grow-1">
              <div class="fw-bold small text-dark" th:text="${item.name}">Tên sản phẩm</div>
<!--              <small class="text-muted" th:text="${item.brand}">Thương hiệu</small>-->
            </div>
            <div class="fw-bold text-end small"
                 th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
            </div>
          </div>
        </div>

        <div class="bg-light p-3 rounded-3">
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Tạm tính:</span>
            <span class="fw-bold small" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Phí vận chuyển:</span>
            <span class="text-success fw-bold small">Miễn phí</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold text-dark">TỔNG CỘNG:</span>
            <span class="fs-4 fw-bold text-danger"
                  th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
          </div>
        </div>

        <p class="text-muted mt-3" style="font-size: 0.75rem; font-style: italic;">
          * Bằng cách đặt hàng, bạn đồng ý với các điều khoản dịch vụ của Gentle Glasses.
        </p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
