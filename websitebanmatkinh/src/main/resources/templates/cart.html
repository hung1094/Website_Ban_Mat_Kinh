<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cart-wrapper { background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .product-img { width: 100px; height: 75px; object-fit: cover; border-radius: 8px; }
        .table thead { background-color: #212529; color: white; }
        .btn-checkout { background: #000; color: #fff; transition: 0.3s; }
        .btn-checkout:hover { background: #333; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="cart-wrapper p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0"><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>
            <a href="/products" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th class="py-3 px-4">Ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th style="width: 150px;">Số lượng</th>
                    <th>Thành tiền</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td class="px-4">
                        <img th:src="${item.imageUrl}" class="product-img shadow-sm" alt="Kính">
                    </td>
                    <td>
                        <div class="fw-bold" th:text="${item.name}">Tên kính</div>
                        <small class="text-muted">ID: <span th:text="${item.productId}"></span></small>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="d-flex">
                            <input type="hidden" name="id" th:value="${item.productId}">
                            <input type="number" name="qty" th:value="${item.quantity}" min="1"
                                   class="form-control form-control-sm me-1" style="width: 60px;">
                            <button class="btn btn-sm btn-dark"><i class="bi bi-check-lg"></i></button>
                        </form>
                    </td>
                    <td class="fw-bold text-danger"
                        th:text="${#numbers.formatDecimal(item.getAmount(), 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td class="text-center">
                        <a th:href="@{'/cart/remove/' + ${item.productId}}"
                           class="btn btn-sm btn-outline-danger rounded-pill">
                            <i class="bi bi-x-lg"></i> Xóa
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(cartItems)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-bag-x fs-1"></i>
                        <p class="mt-2">Chưa có sản phẩm nào trong giỏ hàng.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="row mt-4 align-items-center" th:if="${!#lists.isEmpty(cartItems)}">
            <div class="col-md-6 text-muted">
                * Miễn phí vận chuyển cho đơn hàng từ 500k.
            </div>
            <div class="col-md-6 text-end">
                <h4 class="mb-3">Tổng cộng:
                    <span class="text-danger fw-bold ms-2"
                          th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                </h4>
                <a th:href="@{/checkout}" class="btn btn-dark btn-lg px-5 py-3 fw-bold rounded-pill shadow">
                    THANH TOÁN NGAY <i class="bi bi-credit-card ms-2"></i>
                </a>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
