<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cửa Hàng Mắt Kính GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .card-img-top { height: 200px; object-fit: cover; transition: 0.3s; }
        .card:hover .card-img-top { transform: scale(1.05); }
        .hero-section { background: #000; color: white; padding: 60px 0; margin-bottom: 40px; }
        .filter-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .pagination .page-link { color: #000; border: none; margin: 0 3px; border-radius: 8px; }
        .pagination .active .page-link { background-color: #000; border-color: #000; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/products}">GENTLE GLASSES</a>
        <div class="d-flex">
            <a th:href="@{/cart}" class="btn btn-outline-light position-relative">
                <i class="bi bi-cart3"></i>
            </a>
        </div>
    </div>
</nav>

<div class="hero-section text-center">
    <h1 class="display-4 fw-bold">Thế giới Mắt Kính</h1>
    <p class="lead">Phong cách - Thời thượng - Chất lượng J2EE</p>
</div>

<div class="container">
    <div class="card filter-card p-4 mb-5 bg-white">
        <form th:action="@{/products}" method="get" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label small fw-bold">Tìm kiếm</label>
                <div class="input-group">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Nhập tên sản phẩm...">
                    <button class="btn btn-dark" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </div>

            <div class="col-md-3">
                <label class="form-label small fw-bold">Danh mục</label>
                <select name="categoryId" class="form-select" onchange="this.form.submit()">
                    <option value="">Tất cả sản phẩm</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == categoryId}"></option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label small fw-bold">Sắp xếp theo giá</label>
                <select name="sort" class="form-select" onchange="this.form.submit()">
                    <option value="asc" th:selected="${sort == 'asc'}">Giá: Thấp đến Cao</option>
                    <option value="desc" th:selected="${sort == 'desc'}">Giá: Cao đến Thấp</option>
                </select>
            </div>

            <div class="col-md-2">
                <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Xóa lọc</a>
            </div>
        </form>
    </div>

    <h3 class="mb-4 fw-bold" th:text="${keyword != null ? 'Kết quả cho: ' + keyword : 'Sản phẩm mới nhất'}">Danh sách</h3>

    <div class="row g-4">
        <div class="col-md-4 col-lg-3" th:each="product : ${listProducts}">
            <div class="card h-100 shadow-sm border-0 rounded-3 overflow-hidden">
                <img th:src="${product.imageUrl != null && !product.imageUrl.isEmpty() ? product.imageUrl : 'https://via.placeholder.com/300x200?text=No+Image'}"
                     class="card-img-top"
                     th:alt="${product.name}">

                <div class="card-body">
                    <p class="text-muted small mb-1" th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">Category</p>
                    <h6 class="card-title fw-bold text-truncate" th:text="${product.name}">Tên kính</h6>
                    <h5 class="text-danger fw-bold my-3"
                        th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h5>

                    <div class="d-grid gap-2">
                        <a th:href="@{'/products/' + ${product.id}}" class="btn btn-sm btn-outline-dark">Chi tiết</a>
                        <a th:href="@{'/cart/add/' + ${product.id}}" class="btn btn-sm btn-dark">
                            <i class="bi bi-cart-plus me-1"></i> Giỏ hàng
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(listProducts)}">
            <i class="bi bi-search" style="font-size: 3rem; color: #ccc;"></i>
            <p class="mt-3 text-muted">Rất tiếc, chúng tôi không tìm thấy sản phẩm nào phù hợp.</p>
        </div>
    </div>

    <nav aria-label="Page navigation" class="mt-5" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link shadow-sm"
                   th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link shadow-sm" th:text="${i + 1}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">1</a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link shadow-sm"
                   th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<footer class="bg-dark text-white text-center py-5 mt-5">
    <div class="container">
        <p class="mb-2 fw-bold">GENTLE GLASSES - J2EE EXPERT</p>
        <p class="small text-muted mb-0">&copy; 2026 Bản quyền thuộc về Team phát triển ứng dụng J2EE.</p>
    </div>
</footer>

</body>
</html>
