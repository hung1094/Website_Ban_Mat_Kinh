<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công | GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #000000;
            --subtle-gray: #f9f9f9;
            --border-color: #eeeeee;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--primary-dark);
        }

        .success-card {
            max-width: 600px;
            margin: auto;
            background: white;
            border-radius: 40px; /* Bo tròn cực đại */
            border: 1px solid var(--border-color);
            padding: 60px 40px;
            text-align: center;
        }

        /* Biểu tượng túi đồ tối giản */
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: var(--primary-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            margin: 0 auto 30px;
            font-size: 32px;
            animation: cubic-bezier(0.16, 1, 0.3, 1) 0.8s slideUp;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-weight: 200;
            letter-spacing: -1px;
            font-size: 2rem;
            text-transform: uppercase;
        }

        .order-info-box {
            background-color: var(--subtle-gray);
            border-radius: 25px;
            padding: 30px;
            margin: 30px 0;
            border: none;
        }

        .label-sm {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #888;
            display: block;
            margin-bottom: 5px;
        }

        /* Nút bấm bo tròn đồng bộ */
        .btn-black {
            background-color: var(--primary-dark);
            color: white;
            border-radius: 18px;
            padding: 15px 35px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.4s;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-black:hover {
            background-color: #333;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-dark);
            border: 1.5px solid var(--primary-dark);
            border-radius: 18px;
            padding: 15px 35px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-outline:hover {
            background-color: var(--subtle-gray);
        }

        .badge-status {
            font-size: 0.7rem;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="success-card shadow-sm">
        <div class="icon-box">
            <i class="bi bi-check2-all"></i>
        </div>

        <h2 class="mb-3">Đặt hàng thành công</h2>
        <p class="text-muted px-lg-4 mb-4 small">
            Chào <span class="fw-bold text-dark" th:text="${session.loggedInUser.fullName}">Khách hàng</span>,
            GENTLE đã nhận đơn hàng của bạn. Chúng tôi sẽ sớm liên hệ để xác nhận và giao kính đến bạn.
        </p>

        <div class="order-info-box text-start" th:if="${order != null}">
            <div class="row g-4">
                <div class="col-6 border-end">
                    <span class="label-sm">Mã đơn hàng</span>
                    <strong th:text="'#' + ${order.id}">#12345</strong>
                </div>
                <div class="col-6">
                    <span class="label-sm">Thanh toán</span>
                    <span th:if="${order.paymentMethod == 'COD'}" class="badge-status bg-white border text-dark">TIỀN MẶT</span>
                    <span th:if="${order.paymentMethod == 'MOMO'}" class="badge-status bg-white border text-primary">MOMO</span>
                </div>

                <div class="col-12 border-top pt-4">
                    <span class="label-sm">Thông tin nhận hàng</span>
                    <p class="mb-1 small fw-bold" th:text="${order.customerName} + ' • ' + ${order.phone}"></p>
                    <p class="mb-0 small text-muted lh-base" th:text="${order.address}"></p>
                </div>

                <div class="col-12 border-top pt-4 d-flex justify-content-between align-items-center">
                    <span class="label-sm mb-0">Tổng cộng</span>
                    <span class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                </div>
            </div>
        </div>

        <div class="d-grid gap-3 d-md-flex justify-content-md-center mb-5">
            <a th:href="@{/}" class="btn btn-black px-4">
                Tiếp tục mua sắm
            </a>
            <a th:href="@{/user/orders}" class="btn btn-outline px-4">
                Lịch sử đơn hàng
            </a>
        </div>

        <div class="pt-4 border-top">
            <div class="d-flex justify-content-center gap-4 text-muted small">
                <span><i class="bi bi-telephone me-1"></i> 1900 88xx</span>
                <span><i class="bi bi-envelope me-1"></i> support@gentle.com</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
