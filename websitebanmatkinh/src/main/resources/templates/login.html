<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #1a1a1a;
            --accent-red: #ee4d2d;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            /* Nền Gradient hiện đại */
            background: radial-gradient(circle at top right, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Hiệu ứng trang trí nền */
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
        }
        .shape-1 { width: 400px; height: 400px; background: rgba(238, 77, 45, 0.1); top: -100px; right: -100px; }
        .shape-2 { width: 300px; height: 300px; background: rgba(0, 0, 0, 0.05); bottom: -50px; left: -50px; }

        .auth-card {
            max-width: 420px;
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 40px;
            transition: all 0.4s ease;
        }

        .brand-logo {
            font-size: 1.8rem;
            letter-spacing: -1px;
            color: var(--primary-dark);
        }

        .form-label {
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            color: #555;
        }

        .input-group {
            background: #f8f9fa;
            border-radius: 12px;
            border: 1.5px solid #eee;
            transition: 0.3s;
            overflow: hidden;
        }

        .input-group:focus-within {
            border-color: var(--primary-dark);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
        }

        .input-group-text {
            background: transparent;
            border: none;
            padding-left: 15px;
            color: #999;
        }

        .form-control {
            background: transparent;
            border: none;
            padding: 12px 15px 12px 5px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: none;
            background: transparent;
        }

        .btn-login {
            background: var(--primary-dark);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-login:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            color: #fff;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .social-login {
            border-top: 1px solid #eee;
            margin-top: 25px;
            padding-top: 20px;
        }

        .link-secondary-custom {
            color: #666;
            transition: 0.2s;
        }

        .link-secondary-custom:hover {
            color: var(--accent-red);
        }

        /* Animation cho các phần tử */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="auth-card fade-in">
    <div class="text-center mb-5">
        <h2 class="fw-bold brand-logo mb-1">GENTLE<span class="text-danger">.</span></h2>
        <p class="text-muted small">Mừng bạn quay trở lại</p>
    </div>

    <div th:if="${error}" class="alert alert-danger border-0 d-flex align-items-center animate__animated animate__shakeX">
        <i class="bi bi-shield-exclamation me-2 fs-5"></i>
        <div th:text="${error}"></div>
    </div>

    <div th:if="${param.success}" class="alert alert-success border-0 d-flex align-items-center">
        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
        <div>Đăng ký thành công! Đăng nhập ngay.</div>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="text" name="username" class="form-control"
                       placeholder="Username của bạn" required>
            </div>
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label fw-semibold">Mật khẩu</label>
                <a href="#" class="text-muted small text-decoration-none mb-2">Quên mật khẩu?</a>
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login w-100 shadow-sm">
            Đăng nhập <i class="bi bi-arrow-right-short fs-5"></i>
        </button>

        <div class="text-center mt-4">
            <p class="text-muted small">Bạn là thành viên mới?
                <a th:href="@{/register}" class="text-dark fw-bold text-decoration-none border-bottom border-dark border-2">Đăng ký ngay</a>
            </p>
            <div class="mt-4 pt-2 border-top">
                <a th:href="@{/products}" class="link-secondary-custom small text-decoration-none">
                    <i class="bi bi-house-door me-1"></i> Quay lại cửa hàng
                </a>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
