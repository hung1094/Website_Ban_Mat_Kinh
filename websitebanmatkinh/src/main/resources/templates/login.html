<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            max-width: 400px;
            width: 100%;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: none;
        }
        .btn-login {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #333;
            color: #fff;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #000;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="card auth-card p-4 p-md-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">GENTLE GLASSES</h2>
            <p class="text-muted small">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-center py-2 border-0 mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div class="small" th:text="${error}"></div>
        </div>

        <div th:if="${param.success}" class="alert alert-success d-flex align-items-center py-2 border-0 mb-4" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <div class="small">Đăng ký thành công! Mời bạn đăng nhập.</div>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-start-0"
                           placeholder="Nhập username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0"
                           placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100 fw-bold rounded-pill mb-3 shadow-sm">
                ĐĂNG NHẬP <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>

            <div class="text-center mt-4">
                <p class="text-muted small">Chưa có tài khoản?
                    <a th:href="@{/register}" class="text-dark fw-bold text-decoration-none">Đăng ký ngay</a>
                </p>
                <a th:href="@{/products}" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Quay lại cửa hàng
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
