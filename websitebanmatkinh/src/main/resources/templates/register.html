<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên | GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #1a1a1a;
            --accent-red: #ee4d2d;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            background: radial-gradient(circle at bottom left, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Trang trí nền giống trang Login */
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
        }
        .shape-1 { width: 350px; height: 350px; background: rgba(238, 77, 45, 0.08); bottom: -50px; right: -50px; }
        .shape-2 { width: 300px; height: 300px; background: rgba(0, 0, 0, 0.05); top: -50px; left: -50px; }

        .auth-card {
            max-width: 480px;
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin: 40px 0;
            transition: all 0.4s ease;
        }

        .brand-logo {
            font-size: 1.6rem;
            letter-spacing: -1px;
            color: var(--primary-dark);
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .input-group {
            background: #f8f9fa;
            border-radius: 12px;
            border: 1.5px solid #eee;
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--primary-dark);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #999;
            padding-left: 15px;
        }

        .form-control {
            background: transparent;
            border: none;
            padding: 12px 15px 12px 5px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: none;
            background: transparent;
        }

        .btn-register {
            background: var(--primary-dark);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            color: #fff;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="auth-card fade-in">
    <div class="text-center mb-4">
        <h2 class="fw-bold brand-logo mb-1">GENTLE<span class="text-danger">.</span></h2>
        <p class="text-muted small">Khám phá phong cách kính mắt riêng của bạn</p>
    </div>

    <div th:if="${error}" class="alert alert-danger border-0 small py-2 d-flex align-items-center mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <div th:text="${error}"></div>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" th:field="*{fullName}" class="form-control"
                       placeholder="Ví dụ: Nguyễn Văn A" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-at"></i></span>
                <input type="text" th:field="*{username}" class="form-control"
                       placeholder="Username" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="Tối thiểu 6 ký tự" required>
            </div>
        </div>

        <button type="submit" class="btn btn-register w-100 shadow-sm">
            TẠO TÀI KHOẢN <i class="bi bi-arrow-right-short fs-5"></i>
        </button>

        <div class="text-center mt-4">
            <p class="text-muted small">Đã là thành viên?
                <a th:href="@{/login}" class="text-dark fw-bold text-decoration-none border-bottom border-dark border-2">Đăng nhập</a>
            </p>
            <div class="mt-4 pt-2 border-top">
                <a th:href="@{/products}" class="text-muted small text-decoration-none">
                    <i class="bi bi-house-door me-1"></i> Quay lại cửa hàng
                </a>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
