<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 450px; margin: 80px auto; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="card auth-card p-4 p-md-5 bg-white">
        <h2 class="text-center fw-bold mb-4">ĐĂNG KÝ</h2>
        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold">Họ và tên</label>
                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Tên đăng nhập</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Mật khẩu</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold mt-3">TẠO TÀI KHOẢN</button>
            <p class="text-center mt-3 small">Đã có tài khoản? <a href="/login" class="text-dark">Đăng nhập</a></p>
        </form>
    </div>
</div>
</body>
</html>
