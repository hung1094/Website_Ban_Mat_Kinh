<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán qua Ví MoMo - GENTLE GLASSES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #ae2070; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; }
    .momo-container { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 450px; width: 100%; }
    .momo-logo { width: 80px; margin-bottom: 20px; }
    .qr-wrapper { background: #f8f9fa; padding: 20px; border-radius: 16px; border: 1px dashed #ae2070; margin: 20px 0; position: relative; }
    .amount-box { background: #fff0f6; color: #ae2070; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }

    /* Hiệu ứng chờ thanh toán */
    .status-waiting { font-size: 0.9rem; color: #ae2070; font-weight: 500; }
    .spinner-border-sm { width: 1rem; height: 1rem; border-width: 0.15em; }
  </style>
</head>
<body>

<div class="container d-flex justify-content-center">
  <div class="momo-container text-center">
    <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" alt="MoMo Logo" class="momo-logo">
    <h4 class="fw-bold">Đang chờ thanh toán...</h4>
    <p class="text-muted small">Mã đơn hàng: <span class="fw-bold" th:text="'#' + ${order.id}"></span></p>

    <div class="amount-box" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></div>

    <div class="qr-wrapper">
      <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=GENTLEGLASSES_ORDER_' + ${order.id}"
           alt="QR Thanh toán" class="img-fluid rounded shadow-sm">
      <div class="mt-3 status-waiting">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        Đang đợi bạn quét mã...
      </div>
    </div>

    <div class="alert alert-light border py-2 small mb-4">
      <i class="bi bi-shield-lock me-1"></i> Giao dịch được bảo mật bởi MoMo
    </div>

    <form th:action="@{'/payment/momo/confirm/' + ${order.id}}" method="post">
      <button type="submit" class="btn btn-outline-secondary btn-sm w-100 rounded-pill">Xác nhận thủ công nếu đã thanh toán</button>
    </form>

    <a th:href="@{/checkout}" class="btn btn-link btn-sm text-muted mt-3 text-decoration-none">Hủy giao dịch</a>
  </div>
</div>

<script th:inline="javascript">
  const orderId = [[${order.id}]];

  function checkStatus() {
    fetch('/payment/momo/check-status/' + orderId)
            .then(response => response.text())
            .then(status => {
              console.log("Current Status: " + status);
              if (status === 'PAID') {
                // Nếu trạng thái đổi sang PAID, tự động chuyển trang
                window.location.href = '/checkout/success';
              }
            })
            .catch(err => console.error("Error checking status:", err));
  }

  // Kiểm tra mỗi 2 giây
  const interval = setInterval(checkStatus, 2000);
</script>

</body>
</html>
