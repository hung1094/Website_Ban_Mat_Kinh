<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - Chi tiết sản phẩm'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #ee4d2d; }
        body { background-color: #f8f9fa; }
        .product-card-container { border-radius: 15px; border: none; }
        .carousel-item img { height: 500px; object-fit: contain; background: #fff; }
        .thumbnail-img { width: 70px; height: 70px; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 8px; transition: 0.2s; }
        .thumbnail-img.active, .thumbnail-img:hover { border-color: var(--accent); }
        .price-tag { font-size: 2.5rem; color: var(--accent); font-weight: 800; }

        /* Related Products Style */
        .related-card { transition: 0.3s; border: none; border-radius: 10px; overflow: hidden; }
        .related-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .related-img { height: 180px; object-fit: cover; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" th:href="@{/}">GENTLE<span class="text-danger">.</span></a>
        <div class="d-flex gap-3">
            <a th:href="@{/cart}" class="text-white fs-4"><i class="bi bi-bag"></i></a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-muted">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}" class="text-decoration-none text-muted">Cửa hàng</a></li>
            <li class="breadcrumb-item active fw-bold text-dark" th:text="${product.name}"></li>
        </ol>
    </nav>

    <div class="card product-card-container shadow-sm p-4 mb-5">
        <div class="row">
            <div class="col-lg-6">
                <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner border rounded">
                        <div th:each="img, iter : ${product.images}"
                             th:class="${iter.index == 0} ? 'carousel-item active' : 'carousel-item'">
                            <img th:src="${img.url}" class="d-block w-100" alt="Sản phẩm">
                        </div>
                        <div th:if="${#lists.isEmpty(product.images)}" class="carousel-item active">
                            <img src="https://via.placeholder.com/500x500?text=No+Image" class="d-block w-100">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon bg-dark rounded-circle" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon bg-dark rounded-circle" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="d-flex gap-2 mt-3 overflow-auto pb-2">
                    <img th:each="img, iter : ${product.images}" th:src="${img.url}"
                         class="thumbnail-img" th:classappend="${iter.index == 0} ? 'active'"
                         th:data-bs-target="'#productCarousel'" th:data-bs-slide-to="${iter.index}">
                </div>
            </div>

            <div class="col-lg-6 ps-lg-5">
                <span class="badge bg-danger mb-2" th:if="${product.stock > 0}">Yêu thích</span>
                <h1 class="fw-bold mb-2" th:text="${product.name}">Tên sản phẩm</h1>
                <p class="text-muted mb-4">Thương hiệu: <strong class="text-primary" th:text="${product.brand}"></strong></p>

                <div class="price-section bg-light p-4 rounded-3 mb-4">
                    <div class="price-tag" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                    <small class="text-muted"><i class="bi bi-shield-check"></i> Cam kết chính hãng 100%</small>
                </div>

                <div class="specs mb-4">
                    <div class="row">
                        <div class="col-6"><p><strong>Chất liệu:</strong> <span th:text="${product.material != null ? product.material : 'Acetate'}"></span></p></div>
                        <div class="col-6">
                            <p><strong>Trạng thái:</strong>
                                <span th:class="${product.stock > 0 ? 'text-success fw-bold' : 'text-danger fw-bold'}"
                                      th:text="${product.stock > 0 ? 'Còn hàng' : 'Hết hàng'}"></span>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="actions d-flex gap-3 mb-4">
                    <a th:href="@{'/cart/add/' + ${product.id}}" class="btn btn-outline-danger btn-lg flex-grow-1 py-3 fw-bold" th:classappend="${product.stock <= 0} ? 'disabled'">
                        <i class="bi bi-cart-plus me-2"></i>Thêm vào giỏ
                    </a>
                    <a href="#" class="btn btn-danger btn-lg flex-grow-1 py-3 fw-bold" th:classappend="${product.stock <= 0} ? 'disabled'">Mua ngay</a>
                </div>

                <div class="description border-top pt-4">
                    <h6 class="fw-bold text-uppercase small text-muted mb-3">Mô tả sản phẩm</h6>
                    <p class="text-secondary lh-base" th:text="${product.description}"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="related-products mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">SẢN PHẨM LIÊN QUAN</h4>
            <a th:href="@{/products}" class="text-danger text-decoration-none fw-bold small">Xem tất cả <i class="bi bi-chevron-right"></i></a>
        </div>
        <div class="row g-4">
            <div class="col-md-3 col-6" th:each="rp : ${relatedProducts}">
                <div class="card h-100 related-card shadow-sm">
                    <a th:href="@{'/products/' + ${rp.id}}">
                        <img th:src="${rp.imageUrl}" class="card-img-top related-img" alt="Sản phẩm">
                    </a>
                    <div class="card-body p-3 text-center">
                        <h6 class="card-title text-truncate fw-bold mb-2" th:text="${rp.name}"></h6>
                        <p class="text-danger fw-bold mb-0" th:text="${#numbers.formatDecimal(rp.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                    </div>
                </div>
            </div>
            <div class="col-12 text-center text-muted py-4" th:if="${#lists.isEmpty(relatedProducts)}">
                <p>Không có sản phẩm tương tự nào khác.</p>
            </div>
        </div>
    </div>
</div>

<footer class="bg-white border-top py-5 text-center mt-auto">
    <p class="text-muted small">&copy; 2026 GENTLE GLASSES - BY HOÀNG MẠNH HÙNG</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
