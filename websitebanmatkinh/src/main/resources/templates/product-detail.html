<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' | GENTLE GLASSES'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #1a1a1a;
            --accent-red: #ee4d2d;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            background-color: #fcfcfc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--primary-dark);
        }

        /* Navbar hiện đại */
        .navbar {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.9) !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Thẻ sản phẩm chính */
        .product-main-card {
            background: #fff;
            border-radius: 30px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        /* Carousel mượt mà */
        .carousel-inner {
            background: #fdfdfd;
            border-radius: 20px;
        }
        .carousel-item img {
            height: 500px;
            object-fit: contain;
            padding: 30px;
        }

        /* Nút điều hướng Carousel tinh tế */
        .carousel-control-prev-icon, .carousel-control-next-icon {
            filter: invert(1); /* Chuyển icon sang màu đen */
            width: 2.5rem;
            height: 2.5rem;
        }

        /* Thumbnails */
        .thumbnail-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            opacity: 0.6;
        }
        .thumbnail-img.active, .thumbnail-img:hover {
            border-color: var(--primary-dark);
            opacity: 1;
            transform: translateY(-3px);
        }

        /* Giá tiền và thông tin */
        .price-tag {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -1px;
        }

        .promo-box {
            background: #f8f9fa;
            border-radius: 15px;
            border: 1px dashed #ced4da;
        }

        /* Buttons */
        .btn-action {
            border-radius: 12px;
            padding: 14px 24px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-add-cart {
            border: 2px solid var(--primary-dark);
            color: var(--primary-dark);
            background: transparent;
        }
        .btn-add-cart:hover {
            background: var(--primary-dark);
            color: #fff;
        }
        .btn-buy-now {
            background: var(--accent-red);
            color: #fff;
            border: none;
        }
        .btn-buy-now:hover {
            background: #d73211;
            box-shadow: 0 8px 20px rgba(238, 77, 45, 0.25);
        }

        /* Related Products */
        .related-card {
            border: none;
            border-radius: 20px;
            transition: 0.4s;
            background: #fff;
        }
        .related-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
        }
        .related-img {
            border-radius: 15px;
            height: 220px;
            object-fit: contain;
            background: #f9f9f9;
            padding: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" th:href="@{/}">GENTLE<span class="text-danger">.</span></a>
        <div class="d-flex gap-3">
            <a th:href="@{/cart}" class="btn btn-light rounded-circle shadow-sm"><i class="bi bi-bag-heart fs-5"></i></a>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-muted">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}" class="text-decoration-none text-muted">Shop</a></li>
            <li class="breadcrumb-item active fw-bold text-dark" th:text="${product.name}"></li>
        </ol>
    </nav>

    <div class="product-main-card p-4 p-lg-5 mb-5 shadow-sm">
        <div class="row g-5">
            <div class="col-lg-6">
                <div id="productCarousel" class="carousel slide" data-bs-ride="false">
                    <div class="carousel-inner">
                        <div th:each="img, iter : ${product.images}"
                             th:class="${iter.index == 0} ? 'carousel-item active' : 'carousel-item'">
                            <img th:src="${img.url}" class="d-block w-100" alt="Product image">
                        </div>
                        <div th:if="${#lists.isEmpty(product.images)}" class="carousel-item active">
                            <img src="https://via.placeholder.com/500x500?text=No+Image" class="d-block w-100">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="d-flex gap-3 mt-4 overflow-auto pb-2 px-1">
                    <img th:each="img, iter : ${product.images}" th:src="${img.url}"
                         class="thumbnail-img shadow-sm"
                         th:classappend="${iter.index == 0} ? 'active'"
                         data-bs-target="#productCarousel"
                         th:data-bs-slide-to="${iter.index}">
                </div>
            </div>

            <div class="col-lg-6 ps-lg-5">
                <div class="mb-3">
                    <span class="badge bg-dark px-3 py-2 rounded-pill mb-2" th:if="${product.stock > 0}">BEST SELLER</span>
                    <h1 class="fw-bold mb-1" th:text="${product.name}">Tên sản phẩm</h1>
                    <p class="text-muted">Brand: <span class="fw-bold text-dark" th:text="${product.brand}"></span></p>
                </div>

                <div class="price-section py-3 mb-4">
                    <div class="price-tag" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                    <div class="mt-2 text-success small fw-bold">
                        <i class="bi bi-patch-check-fill"></i> Miễn phí giao hàng toàn quốc
                    </div>
                </div>

                <div class="promo-box p-3 mb-4">
                    <div class="row text-center g-2">
                        <div class="col-4 border-end">
                            <small class="text-muted d-block">Chất liệu</small>
                            <span class="fw-bold small" th:text="${product.material != null ? product.material : 'Acetate'}"></span>
                        </div>
                        <div class="col-4 border-end">
                            <small class="text-muted d-block">Trạng thái</small>
                            <span th:class="${product.stock > 0 ? 'text-success fw-bold small' : 'text-danger fw-bold small'}"
                                  th:text="${product.stock > 0 ? 'Còn hàng' : 'Hết hàng'}"></span>
                        </div>
                        <div class="col-4">
                            <small class="text-muted d-block">Bảo hành</small>
                            <span class="fw-bold small">12 Tháng</span>
                        </div>
                    </div>
                </div>

                <div class="actions d-grid gap-3 mb-4">
                    <div class="d-flex gap-3">
                        <a th:href="@{'/cart/add/' + ${product.id}}"
                           class="btn btn-action btn-add-cart flex-grow-1"
                           th:classappend="${product.stock <= 0} ? 'disabled'">
                            <i class="bi bi-cart3 me-2"></i>THÊM VÀO GIỎ
                        </a>
                    </div>
                    <a href="#" class="btn btn-action btn-buy-now"
                       th:classappend="${product.stock <= 0} ? 'disabled'">MUA NGAY</a>
                </div>

                <div class="description pt-4 border-top">
                    <h6 class="fw-bold text-uppercase small text-muted mb-3">Câu chuyện sản phẩm</h6>
                    <p class="text-secondary lh-lg small" th:text="${product.description}"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="related-products mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">BẠN CŨNG SẼ THÍCH</h4>
            <a th:href="@{/products}" class="text-dark fw-bold small text-decoration-none border-bottom border-dark">XEM TẤT CẢ</a>
        </div>
        <div class="row g-4">
            <div class="col-md-3 col-6" th:each="rp : ${relatedProducts}">
                <div class="card h-100 related-card shadow-sm p-2">
                    <a th:href="@{'/products/' + ${rp.id}}">
                        <img th:src="${rp.imageUrl}" class="card-img-top related-img" alt="Sản phẩm liên quan">
                    </a>
                    <div class="card-body p-3 text-center">
                        <h6 class="card-title text-truncate fw-bold mb-1" th:text="${rp.name}"></h6>
                        <p class="text-danger fw-bold mb-0" th:text="${#numbers.formatDecimal(rp.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-white border-top py-5 text-center mt-5">
    <div class="container">
        <p class="fw-bold mb-1">GENTLE<span class="text-danger">.</span></p>
        <p class="text-muted small mb-0">&copy; 2026 GENTLE GLASSES - BY HOÀNG MẠNH HÙNG</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
