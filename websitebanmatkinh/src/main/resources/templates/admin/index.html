<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: admin_head('Quản lý Sản phẩm')}"></head>
<style>
    /* Custom Table Styling */
    .table thead th {
        background-color: #fafafa;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
        font-weight: 800;
        border-top: none;
        padding: 20px 15px;
        color: #888;
    }

    .table tbody td {
        padding: 20px 15px;
        border-bottom: 1px solid #f1f1f1;
        font-size: 0.9rem;
    }

    /* Product Image Frame */
    .img-product-admin {
        object-fit: cover;
        border-radius: 0px; /* Square modern look */
        border: 1px solid #eee;
        padding: 2px;
        background: #fff;
    }

    /* Modern Buttons */
    .btn-add-new {
        background: #000;
        color: #fff;
        border-radius: 0;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 12px;
        padding: 12px 25px;
        border: 1px solid #000;
        transition: 0.3s;
    }
    .btn-add-new:hover {
        background: #fff;
        color: #000;
    }

    .btn-action-outline {
        border: 1px solid #eee;
        color: #000;
        border-radius: 0;
        padding: 6px 12px;
        transition: 0.2s;
        background: #fff;
    }
    .btn-action-outline:hover {
        background: #000;
        color: #fff;
        border-color: #000;
    }

    .btn-delete-outline:hover {
        background: #ff0000;
        border-color: #ff0000;
        color: #fff;
    }

    /* Brand Tag */
    .brand-tag {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #000;
        background: #f0f0f0;
        padding: 4px 10px;
        display: inline-block;
    }

    /* Stock Status */
    .stock-indicator {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
    }
</style>
<body>
<div th:replace="~{admin/fragments :: sidebar}"></div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <h6 class="text-uppercase text-muted fw-800 mb-1" style="letter-spacing: 3px; font-size: 10px;">Inventory Management</h6>
            <h2 class="fw-800 text-dark m-0" style="letter-spacing: -1px;">KHO HÀNG KÍNH MẮT</h2>
            <span class="text-muted small fw-600">Hiện có <span class="text-dark fw-800" th:text="${#lists.size(listProducts)}">0</span> mẫu sản phẩm trong hệ thống</span>
        </div>
        <a th:href="@{/admin/products/add}" class="btn btn-add-new">
            <i class="bi bi-plus-lg me-2"></i> THÊM MỚI
        </a>
    </div>

    <div class="card border shadow-none bg-white">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">Mã số</th>
                    <th>Sản phẩm</th>
                    <th>Thương hiệu</th>
                    <th>Giá bán</th>
                    <th>Tồn kho</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${listProducts}">
                    <td class="ps-4 fw-800 text-muted" style="font-size: 12px;" th:text="'#' + ${p.id}"></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <img th:src="${p.imageUrl != null ? p.imageUrl : 'https://placehold.co/60x45'}"
                                 class="img-product-admin me-3" width="70" height="50">
                            <div class="fw-800 text-dark" style="font-size: 0.95rem;" th:text="${p.name}">Tên sản phẩm</div>
                        </div>
                    </td>
                    <td><span class="brand-tag" th:text="${p.brand}">Brand</span></td>
                    <td><span class="fw-800" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span></td>
                    <td>
                        <div class="stock-indicator">
                            <span th:class="${p.stock > 10 ? 'text-dark' : 'text-danger'}">
                                <i class="bi bi-square-fill me-2" style="font-size: 8px;"></i>
                                <span th:text="${p.stock}"></span>
                            </span>
                        </div>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-action-outline me-1" title="Chỉnh sửa">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/admin/products/delete/{id}(id=${p.id})}" class="btn btn-action-outline btn-delete-outline text-danger"
                               onclick="return confirm('Xác nhận xóa sản phẩm này khỏi kho hàng?')" title="Xóa">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listProducts)}">
                    <td colspan="6" class="text-center py-5 text-muted fw-600">Không tìm thấy sản phẩm nào trong kho.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
