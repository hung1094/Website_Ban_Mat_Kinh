<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: admin_head('Bảng điều khiển')}"></head>
<style>
  /* Loại bỏ Gradient, dùng phong cách Monochromatic (Đơn sắc) */
  .icon-shape {
    width: 50px; height: 50px;
    border-radius: 0px; /* Hình vuông tối giản hoặc bo nhẹ 8px */
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8f8f8;
    color: #000;
    border: 1px solid #eee;
    transition: 0.3s;
  }

  .stat-card {
    border: 1px solid #eeeeee !important;
    border-radius: 0px !important; /* Flat design */
    transition: 0.3s;
  }

  .stat-card:hover {
    border-color: #000 !important;
    background-color: #fff;
  }

  .stat-card:hover .icon-shape {
    background: #000;
    color: #fff;
    border-color: #000;
  }

  .table thead th {
    background-color: #fafafa;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 800;
    border-top: none;
    padding: 15px;
  }

  .table tbody td {
    padding: 18px 15px;
    border-bottom: 1px solid #f1f1f1;
  }

  .btn-view-all {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid #000;
    color: #000;
    border-radius: 0;
    padding: 8px 20px;
    transition: 0.3s;
  }

  .btn-view-all:hover {
    background: #000;
    color: #fff;
  }

  /* Trạng thái Badge Trắng Đen */
  .status-badge {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 0;
  }
  .bg-status-pending { background: #f0f0f0; color: #666; }
  .bg-status-success { background: #000; color: #fff; }
  .bg-status-danger { background: #fff; color: #ff0000; border: 1px solid #ff0000; }
</style>
<body>
<div th:replace="~{admin/fragments :: sidebar}"></div>

<div class="main-content">
  <div class="row align-items-center mb-5">
    <div class="col">
      <h6 class="text-uppercase text-muted fw-800 mb-1" style="letter-spacing: 3px; font-size: 10px;">Analytics Overview</h6>
      <h2 class="fw-800 text-dark m-0" style="letter-spacing: -1px;">BẢNG ĐIỀU KHIỂN</h2>
    </div>
    <div class="col-auto">
      <div class="bg-white px-4 py-2 border small fw-800 text-dark">
        <i class="bi bi-clock me-2"></i>
        [[${#temporals.format(#temporals.createNow(), 'dd.MM.yyyy')}]]
      </div>
    </div>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-md-3">
      <div class="card stat-card p-4 bg-white shadow-none">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="text-muted small fw-800 text-uppercase mb-2" style="letter-spacing: 1px;">Doanh thu</div>
            <h3 class="fw-800 mb-0" th:text="${totalRevenue != null ? #numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}">0 ₫</h3>
          </div>
          <div class="icon-shape">
            <i class="bi bi-currency-dollar fs-5"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card p-4 bg-white shadow-none">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="text-muted small fw-800 text-uppercase mb-2" style="letter-spacing: 1px;">Đơn hàng</div>
            <h3 class="fw-800 mb-0" th:text="${totalOrders}">0</h3>
          </div>
          <div class="icon-shape">
            <i class="bi bi-bag-check fs-5"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card p-4 bg-white shadow-none">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="text-muted small fw-800 text-uppercase mb-2" style="letter-spacing: 1px;">Khách hàng</div>
            <h3 class="fw-800 mb-0" th:text="${totalUsers}">0</h3>
          </div>
          <div class="icon-shape">
            <i class="bi bi-person fs-5"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card p-4 bg-white shadow-none">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="text-muted small fw-800 text-uppercase mb-2" style="letter-spacing: 1px;">Sản phẩm</div>
            <h3 class="fw-800 mb-0" th:text="${totalProducts}">0</h3>
          </div>
          <div class="icon-shape">
            <i class="bi bi-glasses fs-5"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card border shadow-none bg-white">
    <div class="card-header bg-white py-4 px-4 border-bottom d-flex justify-content-between align-items-center">
      <h5 class="fw-800 mb-0" style="letter-spacing: -0.5px;">ĐƠN HÀNG GẦN ĐÂY</h5>
      <a th:href="@{/admin/orders}" class="btn btn-view-all">Xem tất cả</a>
    </div>
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
        <tr>
          <th class="ps-4">Mã đơn</th>
          <th>Khách hàng</th>
          <th>Trạng thái</th>
          <th>Tổng cộng</th>
          <th class="text-end pe-4">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${recentOrders}">
          <td class="ps-4 fw-800" th:text="'#' + ${order.id}"></td>
          <td>
            <div class="fw-700" th:text="${order.customerName}">Tên khách</div>
            <div class="text-muted small" th:text="${order.phone}"></div>
          </td>
          <td>
            <span class="status-badge"
                  th:classappend="${order.status == 'PENDING' ? 'bg-status-pending' : (order.status == 'CANCELLED' ? 'bg-status-danger' : 'bg-status-success')}"
                  th:text="${order.status}">PENDING</span>
          </td>
          <td class="fw-800" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
          <td class="text-end pe-4">
            <a th:href="@{/admin/orders/detail/{id}(id=${order.id})}" class="text-dark fs-5">
              <i class="bi bi-arrow-right"></i>
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(recentOrders)}">
          <td colspan="5" class="text-center py-5 text-muted fw-600">Hệ thống chưa ghi nhận đơn hàng mới.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
