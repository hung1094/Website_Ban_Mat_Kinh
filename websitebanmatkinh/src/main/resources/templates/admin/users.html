<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng | EyeGlass Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fe; font-family: 'Inter', sans-serif; }
        .main-content { padding: 2rem; }
        .card-user { border: none; border-radius: 1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .avatar-circle {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 4px 10px rgba(118, 75, 162, 0.3);
        }
        .table thead th {
            background-color: #f6f9fc;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 1.25rem 1rem;
            color: #8898aa;
            border: none;
        }
        .btn-edit { color: #fb6340; background: #fef1ed; border: none; }
        .btn-lock { color: #f5365c; background: #fdebee; border: none; }
        .btn-action-user { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; margin: 0 2px; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="mb-4 d-flex justify-content-between align-items-end">
        <div>
            <h3 class="fw-bold text-dark">Danh sách khách hàng</h3>
            <p class="text-muted mb-0">Quản lý <span th:text="${listUsers.size()}">0</span> thành viên trong hệ thống.</p>
        </div>
        <div class="search-box">
            <input type="text" class="form-control rounded-pill px-4 shadow-sm" placeholder="Tìm tên khách hàng...">
        </div>
    </div>

    <div class="card card-user overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead>
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Khách hàng</th>
                    <th>Email & Số điện thoại</th>
                    <th>Vai trò</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${listUsers}">
                    <td class="ps-4 text-muted small" th:text="'#' + ${user.id}"></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-circle me-3">
                                <span th:text="${#strings.substring((user.fullName != null and !user.fullName.isEmpty() ? user.fullName : 'U'), 0, 1)}"></span>
                            </div>
                            <div>
                                <span class="fw-bold text-dark d-block" th:text="${user.fullName}"></span>
                                <small class="text-muted" th:text="${'@' + user.username}"></small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="fw-medium" th:text="${user.email}"></div>
                        <small class="text-muted"><i class="bi bi-phone me-1"></i> <span th:text="${user.phoneNumber != null ? user.phoneNumber : 'Chưa cập nhật'}"></span></small>
                    </td>
                    <td>
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${user.role == 'ADMIN' ? 'bg-danger-subtle text-danger' : 'bg-primary-subtle text-primary'}"
                                  th:text="${user.role}">
                            </span>
                    </td>
                    <td class="text-center">
                        <button class="btn-action-user btn-edit" title="Sửa quyền"><i class="bi bi-shield-lock"></i></button>
                        <button class="btn-action-user btn-lock" title="Khóa tài khoản"><i class="bi bi-person-x-fill"></i></button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
