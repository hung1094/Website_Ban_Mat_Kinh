<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: admin_head('Quản lý Khách hàng')}"></head>
<style>
    /* Avatar Style - Black & White */
    .avatar-square {
        width: 45px; height: 45px;
        background: #000; /* Nền đen chữ trắng */
        color: #fff;
        border-radius: 0px; /* Hình vuông đồng bộ với các trang khác */
        display: flex; align-items: center; justify-content: center;
        font-weight: 800;
        font-size: 1.1rem;
        text-transform: uppercase;
        border: 1px solid #000;
    }

    /* Search Box Minimalist */
    .search-container-admin .form-control {
        border-radius: 0;
        border: 1px solid #eee;
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 600;
        transition: 0.3s;
    }
    .search-container-admin .form-control:focus {
        border-color: #000;
        box-shadow: none;
        background: #fafafa;
    }

    /* Table Customization */
    .table thead th {
        background-color: #fafafa;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
        font-weight: 800;
        border-top: none;
        padding: 20px 15px;
        color: #888;
    }

    .table tbody td {
        padding: 20px 15px;
        border-bottom: 1px solid #f1f1f1;
    }

    /* Role Badges */
    .role-label {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 6px 12px;
        display: inline-block;
    }
    .role-admin { background: #000; color: #fff; }
    .role-user { background: #f0f0f0; color: #000; border: 1px solid #eee; }

    /* Action Buttons */
    .btn-user-action {
        width: 35px; height: 35px;
        display: inline-flex; align-items: center; justify-content: center;
        border: 1px solid #eee;
        background: #fff;
        color: #000;
        border-radius: 0;
        transition: 0.2s;
        margin: 0 2px;
    }
    .btn-user-action:hover {
        background: #000;
        color: #fff;
        border-color: #000;
    }
    .btn-lock:hover {
        background: #ff0000;
        border-color: #ff0000;
        color: #fff;
    }
</style>
<body>

<div th:replace="~{admin/fragments :: sidebar}"></div>

<div class="main-content">
    <div class="mb-5 d-flex justify-content-between align-items-end">
        <div>
            <h6 class="text-uppercase text-muted fw-800 mb-1" style="letter-spacing: 3px; font-size: 10px;">Membership Control</h6>
            <h2 class="fw-800 text-dark m-0" style="letter-spacing: -1px;">DANH SÁCH KHÁCH HÀNG</h2>
            <p class="text-muted small fw-600 mb-0 mt-1">Quản lý các tài khoản định danh trong hệ thống <span class="text-dark fw-800">GENTLE</span>.</p>
        </div>
        <div class="search-container-admin">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 rounded-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" style="width: 250px;" placeholder="TÌM KIẾM TÀI KHOẢN...">
            </div>
        </div>
    </div>

    <div class="card border shadow-none bg-white">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">Mã số</th>
                    <th>Thông tin khách hàng</th>
                    <th>Thông tin liên hệ</th>
                    <th>Vai trò</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${listUsers}">
                    <td class="ps-4 text-muted fw-800" style="font-size: 12px;" th:text="'#' + ${user.id}"></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-square me-3">
                                <span th:text="${user.fullName != null and !user.fullName.isEmpty() ? #strings.substring(user.fullName, 0, 1) : 'U'}"></span>
                            </div>
                            <div>
                                <span class="fw-800 text-dark d-block" style="font-size: 0.95rem;" th:text="${user.fullName}"></span>
                                <small class="text-muted fw-600" th:text="${'@' + user.username}"></small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="fw-800 text-dark small" th:text="${user.email}"></div>
                        <small class="text-muted fw-600">
                            <i class="bi bi-telephone-fill me-1" style="font-size: 10px;"></i>
                            <span th:text="${user.phoneNumber != null ? user.phoneNumber : 'N/A'}"></span>
                        </small>
                    </td>
                    <td>
                        <span class="role-label"
                              th:classappend="${user.role == 'ADMIN' ? 'role-admin' : 'role-user'}"
                              th:text="${user.role}">
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn-user-action" title="Phân quyền"><i class="bi bi-shield-lock"></i></button>
                        <button class="btn-user-action btn-lock" title="Vô hiệu hóa"><i class="bi bi-person-x"></i></button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listUsers)}">
                    <td colspan="5" class="text-center py-5 text-muted fw-600">Chưa có thành viên nào đăng ký tài khoản.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
