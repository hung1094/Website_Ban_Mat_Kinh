<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng | EyeGlass Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fe; font-family: 'Inter', sans-serif; }
        .main-content { padding: 2rem; }
        .card-table { border: none; border-radius: 1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .table thead th {
            background-color: #f6f9fc;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 1.25rem 1rem;
            color: #8898aa;
        }
        .badge-soft { font-weight: 600; padding: 0.5em 0.8em; border-radius: 50px; }
        .order-id { color: #5e72e4; font-weight: 700; text-decoration: none; }
        .btn-action { width: 35px; height: 35px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .filter-tab { transition: all 0.3s; border: 1px solid #dee2e6; color: #525f7f; }
        .filter-tab.active { background-color: #5e72e4; color: white; border-color: #5e72e4; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark mb-1">Quản lý đơn hàng</h3>
            <p class="text-muted small mb-0">Theo dõi, duyệt và in hóa đơn cho khách hàng.</p>
        </div>
        <button class="btn btn-white shadow-sm border rounded-pill px-4">
            <i class="bi bi-file-earmark-excel-fill text-success me-2"></i> Xuất Excel
        </button>
    </div>

    <div class="d-flex gap-2 mb-4 overflow-auto pb-2">
        <button class="btn btn-sm rounded-pill px-4 filter-tab active">Tất cả</button>
        <button class="btn btn-sm rounded-pill px-4 filter-tab bg-white">Chờ xử lý</button>
        <button class="btn btn-sm rounded-pill px-4 filter-tab bg-white">Đang giao</button>
        <button class="btn btn-sm rounded-pill px-4 filter-tab bg-white">Hoàn tất</button>
    </div>

    <div class="card card-table overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead>
                <tr>
                    <th class="ps-4">Mã đơn</th>
                    <th>Ngày đặt</th>
                    <th>Khách hàng</th>
                    <th>Phương thức</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Chi tiết</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${listOrders}">
                    <td class="ps-4">
                        <span class="order-id" th:text="'#ORD-' + ${order.id}"></span>
                    </td>
                    <td class="text-muted small" th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : '---'}"></td>
                    <td>
                        <div class="fw-bold text-dark" th:text="${order.customerName}"></div>
                        <small class="text-muted" th:text="${order.phone}"></small>
                    </td>
                    <td>
                            <span class="badge bg-light text-dark fw-normal border">
                                <i class="bi bi-wallet2 me-1"></i> <span th:text="${order.paymentMethod}"></span>
                            </span>
                    </td>
                    <td>
                        <span class="fw-bold text-dark" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'POINT', 0, 'COMMA') + ' ₫'}"></span>
                    </td>
                    <td>
                            <span class="badge badge-soft"
                                  th:classappend="${order.status == 'SHIPPING' ? 'bg-info-subtle text-info' : (order.status == 'PENDING' ? 'bg-warning-subtle text-warning' : 'bg-success-subtle text-success')}"
                                  th:text="${order.status}">
                            </span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/orders/detail/{id}(id=${order.id})}" class="btn-action btn-outline-primary border">
                            <i class="bi bi-eye-fill"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
