<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="admin_head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title}">GENTLE Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

    :root {
      --sidebar-width: 260px;
      --bg-light: #ffffff;
      --bg-dark: #000000;
      --border-color: #eeeeee;
      --text-main: #000000;
      --text-muted: #888888;
    }

    body {
      background-color: #fafafa;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
    }

    /* Sidebar - White Background Style */
    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: var(--bg-light);
      z-index: 1000;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .brand-logo {
      padding: 40px 25px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-logo span { font-weight: 300; color: var(--text-muted); margin-left: 5px; }

    /* Navigation */
    .sidebar-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      padding: 30px 30px 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .sidebar .nav-link {
      color: var(--text-main);
      padding: 12px 30px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      border-left: 3px solid transparent;
    }

    .sidebar .nav-link i { font-size: 1.1rem; margin-right: 15px; }

    .sidebar .nav-link:hover {
      background: #f8f8f8;
      color: var(--bg-dark);
    }

    /* Active State: Bold Black */
    .sidebar .nav-link.active {
      background: #f0f0f0;
      color: var(--bg-dark);
      border-left: 3px solid var(--bg-dark);
      font-weight: 800;
    }

    /* Main Content */
    .main-content {
      margin-left: var(--sidebar-width);
      padding: 40px;
    }

    /* Modern Table/Card for Admin */
    .card-custom {
      border: 1px solid var(--border-color);
      border-radius: 0px; /* Modern flat style */
      background: white;
      box-shadow: none;
    }

    /* Logout Section */
    .logout-box {
      margin-top: auto;
      padding: 20px 30px;
      border-top: 1px solid var(--border-color);
    }

    .btn-logout {
      color: var(--text-main);
      font-weight: 700;
      font-size: 0.8rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: 0.2s;
    }

    .btn-logout:hover { color: #ff0000; }
  </style>
</head>

<body>
<div th:fragment="sidebar" class="sidebar">
  <div class="brand-logo">
    GENTLE<span>ADMIN</span>
  </div>

  <div class="sidebar-label">Hệ thống</div>

  <ul class="nav flex-column flex-grow-1">
    <li class="nav-item">
      <a th:href="@{/admin}" class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
        <i class="bi bi-app"></i> TỔNG QUAN
      </a>
    </li>

    <div class="sidebar-label">Quản lý</div>

    <li class="nav-item">
      <a th:href="@{/admin/products}" class="nav-link" th:classappend="${activePage == 'products' ? 'active' : ''}">
        <i class="bi bi-glasses"></i> SẢN PHẨM
      </a>
    </li>
    <li class="nav-item">
      <a th:href="@{/admin/orders}" class="nav-link" th:classappend="${activePage == 'orders' ? 'active' : ''}">
        <i class="bi bi-bag"></i> ĐƠN MUA
      </a>
    </li>
    <li class="nav-item">
      <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}">
        <i class="bi bi-person"></i> KHÁCH HÀNG
      </a>
    </li>
  </ul>

  <div class="logout-box">
    <a th:href="@{/logout}" class="btn-logout">
      <i class="bi bi-arrow-left-circle me-2"></i> ĐĂNG XUẤT
    </a>
  </div>
</div>
</body>
</html>
