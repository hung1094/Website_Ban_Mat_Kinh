<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: admin_head(${product.id == null ? 'Thêm kính mắt mới' : 'Cập nhật sản phẩm'})}"></head>
<style>
    .card-form { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .preview-img { width: 120px; height: 90px; object-fit: cover; border-radius: 8px; border: 2px solid #eee; }
    .image-upload-wrapper {
        border: 2px dashed #0d6efd;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        background: #f8faff;
        cursor: pointer;
        transition: 0.3s;
    }
    .image-upload-wrapper:hover { background: #f0f4ff; border-color: #0056b3; }
    .category-select { border: 1px solid #ced4da; border-radius: 8px; padding: 10px; }
    .category-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.15); }
</style>
<body>

<div th:replace="~{admin/fragments :: sidebar}"></div>

<div class="main-content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-dark mb-1" th:text="${product.id == null ? 'Thêm kính mắt mới' : 'Cập nhật sản phẩm'}"></h3>
                <p class="text-muted small mb-0">Điền đầy đủ thông tin chi tiết cho sản phẩm kính mắt.</p>
            </div>
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary px-4 rounded-pill">
                <i class="bi bi-arrow-left me-2"></i>Quay lại
            </a>
        </div>

        <div class="card card-form p-4 p-lg-5">
            <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{imageUrl}">

                <div class="row g-4">
                    <div class="col-md-8">
                        <label class="form-label fw-bold"><i class="bi bi-info-circle me-1 text-primary"></i> Tên kính mắt</label>
                        <input type="text" th:field="*{name}" class="form-control form-control-lg bg-light border-0" placeholder="Ví dụ: Gentle Monster South Side" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Thương hiệu</label>
                        <input type="text" th:field="*{brand}" class="form-control form-control-lg bg-light border-0" placeholder="Ray-Ban, GM...">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-primary"><i class="bi bi-grid-fill me-1"></i> Loại kính</label>
                        <select th:field="*{category.id}" class="form-select category-select" required>
                            <option value="">-- Chọn phân loại kính --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Chất liệu gọng</label>
                        <input type="text" th:field="*{material}" class="form-control category-select" placeholder="Nhựa Acetate, Titanium...">
                    </div>

                    <div class="col-md-6">
                        <div class="p-3 bg-light rounded-3">
                            <label class="form-label fw-bold text-success"><i class="bi bi-cash-stack me-1"></i> Giá bán lẻ (₫)</label>
                            <div class="input-group">
                                <input type="number" th:field="*{price}" class="form-control border-0 bg-transparent fw-bold fs-5" min="0" required>
                                <span class="input-group-text border-0 bg-transparent fw-bold">VNĐ</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="p-3 bg-light rounded-3">
                            <label class="form-label fw-bold text-warning"><i class="bi bi-box-seam me-1"></i> Số lượng tồn kho</label>
                            <input type="number" th:field="*{stock}" class="form-control border-0 bg-transparent fw-bold fs-5" min="0" required>
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <label class="form-label fw-bold"><i class="bi bi-images me-1 text-primary"></i> Hình ảnh sản phẩm</label>
                        <div class="image-upload-wrapper" onclick="document.getElementById('imageInput').click()">
                            <i class="bi bi-cloud-arrow-up-fill fs-1 text-primary"></i>
                            <h5 class="mt-2 fw-bold">Tải lên hình ảnh</h5>
                            <p class="text-muted small">Nhấn để chọn một hoặc nhiều ảnh sản phẩm (Khuyên dùng: 800x600px)</p>
                            <input type="file" name="imageFiles" id="imageInput" class="d-none" accept="image/*" multiple>
                        </div>

                        <div id="imagePreview" class="d-flex flex-wrap gap-3 mt-3"></div>

                        <div th:if="${not #lists.isEmpty(product.images)}" class="mt-4 p-4 border rounded-3 bg-white shadow-sm">
                            <p class="small text-muted fw-bold mb-3 text-uppercase"><i class="bi bi-hdd-fill me-2"></i>Ảnh đang hiển thị trên Web:</p>
                            <div class="d-flex flex-wrap gap-3">
                                <div th:each="img : ${product.images}" class="position-relative">
                                    <img th:src="${img.url}" class="preview-img border" alt="Existing Image">
                                    <span class="badge bg-dark position-absolute bottom-0 start-0 m-1 opacity-75 small">Hiện tại</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold"><i class="bi bi-pencil-square me-1"></i> Mô tả chi tiết</label>
                        <textarea th:field="*{description}" class="form-control border-0 bg-light" rows="5" placeholder="Nhập mô tả về kiểu dáng, tròng kính, kích thước..."></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-5 border-top pt-4">
                    <button type="reset" class="btn btn-light px-4 py-2 fw-bold">Làm mới form</button>
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-lg">
                        <i class="bi bi-save2 me-2"></i> [[${product.id == null ? 'Tạo sản phẩm ngay' : 'Cập nhật thay đổi'}]]
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function(event) {
        const previewContainer = document.getElementById('imagePreview');
        previewContainer.innerHTML = ''; // Xóa preview cũ

        const files = event.target.files;
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();

            reader.onload = function(e) {
                const imgWrap = document.createElement('div');
                imgWrap.className = 'text-center animate__animated animate__fadeIn';
                imgWrap.innerHTML = `
                    <div class="gallery-item shadow-sm position-relative">
                        <img src="${e.target.result}" class="preview-img border border-primary">
                        <div class="mt-1"><span class="badge bg-primary">Sắp thêm</span></div>
                    </div>`;
                previewContainer.appendChild(imgWrap);
            }
            reader.readAsDataURL(file);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
