<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .gallery-item { position: relative; display: inline-block; }
        /* Highlight cho phần category */
        .category-select { border: 2px solid #0d6efd; }
    </style>
</head>
<body class="container mt-5 bg-light">
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h3 class="mb-0 text-center" th:text="${product.id == null ? 'Thêm kính mắt mới' : 'Cập nhật sản phẩm'}"></h3>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">

                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên kính</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: Ray-Ban Aviator" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-primary">Danh mục sản phẩm</label>
                        <select th:field="*{category}" class="form-select category-select" required>
                            <option value="">-- Chọn một danh mục --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${product.category != null && cat.id == product.category.id}">
                            </option>
                        </select>
                        <div class="form-text small">Phân loại đúng giúp người dùng tìm kiếm sản phẩm nhanh hơn.</div>
                    </div>

                    <div class="row">
                        <!--<div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Thương hiệu</label>
                            <input type="text" th:field="*{brand}" class="form-control" placeholder="Ray-Ban, Gucci...">
                        </div>-->
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Chất liệu</label>
                            <input type="text" th:field="*{material}" class="form-control" placeholder="Titan, Nhựa Acetate...">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                            <input type="number" th:field="*{price}" class="form-control" min="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số lượng kho</label>
                            <input type="number" th:field="*{stock}" class="form-control" min="0" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Hình ảnh sản phẩm (Chọn 1 hoặc nhiều)</label>
                        <input type="file" name="imageFiles" class="form-control" accept="image/*" multiple>

                        <div th:if="${not #lists.isEmpty(product.images)}" class="mt-3">
                            <p class="small text-muted mb-2">Bộ sưu tập ảnh hiện tại:</p>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="img : ${product.images}" class="gallery-item border p-1 rounded">
                                    <img th:src="${img.url}" class="preview-img" alt="Product Image">
                                </div>
                            </div>
                            <input type="hidden" th:field="*{imageUrl}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả sản phẩm</label>
                        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Nhập thông tin chi tiết về kính..."></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a th:href="@{/admin/products}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
