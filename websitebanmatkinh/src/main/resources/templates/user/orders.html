<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/layout :: main-layout(~{::title}, ~{::#order-body})}">
<head>
    <title>Lịch sử đơn mua | GENTLE GLASSES</title>
</head>
<body>
<div id="order-body">
    <div class="mb-5 pb-3 border-bottom">
        <h4 class="fw-800 text-uppercase mb-1" style="letter-spacing: -0.5px;">Đơn mua của tôi</h4>
        <p class="text-muted small mb-0">Theo dõi trạng thái và lịch sử các đơn hàng đã đặt.</p>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 bg-light rounded-5 border border-dashed">
        <div class="mb-3">
            <i class="bi bi-bag-x text-muted" style="font-size: 3rem; opacity: 0.3;"></i>
        </div>
        <p class="text-muted fw-600">Bạn chưa có đơn hàng nào.</p>
        <a th:href="@{/products}" class="btn btn-black-sm mt-2 px-4">MUA SẮM NGAY</a>
    </div>

    <div th:each="order : ${orders}" class="order-card p-4 mb-4 border shadow-sm transition-all">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-light">
            <div class="d-flex align-items-center">
                <span class="fw-800 text-uppercase small bg-dark text-white px-3 py-1 rounded-pill me-2">GENTLE</span>
                <span class="text-muted small">Mã ĐH: #<span th:text="${order.id}">12345</span></span>
            </div>
            <div class="status-badge" th:classappend="${order.status == 'ĐÃ GIAO' ? 'status-done' : 'status-pending'}">
                <i class="bi bi-truck me-1"></i>
                <span class="fw-700 text-uppercase" th:text="${order.status}">ĐANG XỬ LÝ</span>
            </div>
        </div>

        <div th:each="detail : ${order.orderDetails}" class="d-flex mb-3 pb-3 align-items-center order-item border-bottom border-light-subtle">
            <img th:src="${detail.product.imageUrl}"
                 width="80" height="80"
                 class="rounded border shadow-sm"
                 style="object-fit: cover; min-width: 80px;">

            <div class="ms-4 flex-grow-1">
                <div class="fw-800 text-uppercase mb-1 fs-6 text-truncate" style="max-width: 350px;" th:text="${detail.product.name}">Tên sản phẩm</div>
                <div class="text-muted small mb-1">PHÂN LOẠI: <span class="fw-600 text-dark">GENTLE SERIES</span></div>
                <div class="small fw-700 text-secondary">SỐ LƯỢNG: x<span class="text-dark" th:text="${detail.quantity}">1</span></div>
            </div>

            <div class="text-end align-self-center">
                <div class="fw-800 fs-5 text-dark" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
            </div>
        </div>

        <div class="mt-4 pt-3 d-flex justify-content-between align-items-center">
            <div>
                <a th:href="@{'/user/orders/' + ${order.id}}" class="text-dark text-decoration-none small fw-700 hover-underline">
                    XEM CHI TIẾT <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
            <div class="text-end">
                <div class="mb-3">
                    <span class="text-muted small text-uppercase fw-600 me-2">Tổng số tiền:</span>
                    <span class="fs-3 fw-800 text-dark" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                </div>
                <div class="d-flex gap-2 justify-content-end">
                    <button class="btn btn-outline-dark rounded-pill px-4 btn-sm fw-700">MUA LẠI</button>
                    <button class="btn btn-black rounded-pill px-4 btn-sm fw-700">LIÊN HỆ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .fw-800 { font-weight: 800; }
    .fw-700 { font-weight: 700; }
    .fw-600 { font-weight: 600; }

    /* Order Card */
    .order-card {
        background: #fff;
        border-radius: 20px;
        border: 1.5px solid #f1f1f1 !important;
        transition: 0.3s ease;
    }
    .order-card:hover {
        border-color: #000 !important;
    }

    /* Status Badges */
    .status-badge {
        font-size: 10px;
        padding: 6px 16px;
        border-radius: 12px;
        letter-spacing: 0.5px;
    }
    .status-pending { background-color: #fff9e6; color: #d4a017; }
    .status-done { background-color: #f0fdf4; color: #16a34a; }

    /* Buttons */
    .btn-black {
        background: #000;
        color: #fff;
        border: none;
    }
    .btn-black:hover {
        background: #333;
        color: #fff;
    }

    .btn-black-sm {
        background: #000;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        padding: 10px 24px;
        border-radius: 12px;
        border: none;
    }

    .order-item:last-of-type {
        border-bottom: none !important;
    }

    .hover-underline:hover {
        text-decoration: underline !important;
    }
</style>
</body>
</html>
