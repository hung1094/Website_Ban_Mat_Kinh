<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn mua của tôi - GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f5f5f5; }
        .order-card { background: white; border-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.05); border: none; margin-bottom: 12px; }
        .status-header { border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; color: #ee4d2d; font-weight: 500; font-size: 14px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-3">... (copy sidebar qua) ...</div>

        <div class="col-lg-9">
            <div th:if="${#lists.isEmpty(orders)}" class="card border-0 p-5 text-center shadow-sm">
                <i class="bi bi-clipboard-x fs-1 text-muted"></i>
                <p class="mt-2 text-muted">Chưa có đơn hàng nào.</p>
                <a th:href="@{/}" class="btn btn-danger mx-auto px-4 mt-2">Mua sắm ngay</a>
            </div>

            <div th:each="order : ${orders}" class="card order-card p-4">
                <div class="status-header d-flex justify-content-between mb-3">
                    <span class="text-dark"><i class="bi bi-shop me-1"></i> GENTLE GLASSES</span>
                    <span th:text="${order.status}">ĐANG XỬ LÝ</span>
                </div>

                <div th:each="detail : ${order.orderDetails}" class="d-flex mb-3 border-bottom pb-3">
                    <img th:src="${detail.product.imageUrl}" width="80" height="80" class="rounded border" style="object-fit: cover;">
                    <div class="ms-3 flex-grow-1">
                        <div class="fw-bold" th:text="${detail.product.name}">Tên sản phẩm</div>
                        <div class="text-muted small">Phân loại: Classic</div>
                        <div class="small">x<span th:text="${detail.quantity}">1</span></div>
                    </div>
                    <div class="text-danger fw-bold align-self-center" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                </div>

                <div class="text-end mt-2">
                    <div class="mb-3">
                        <span class="text-muted me-2 small"><i class="bi bi-shield-check"></i> Thành tiền:</span>
                        <span class="fs-4 text-danger fw-bold" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>
                    <button class="btn btn-danger px-4 btn-sm rounded-1">Mua lại</button>
                    <a th:href="@{'/user/orders/' + ${order.id}}" class="btn btn-outline-dark px-4 btn-sm ms-2 rounded-1">Chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
