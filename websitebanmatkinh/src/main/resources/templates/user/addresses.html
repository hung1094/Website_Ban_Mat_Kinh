<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/layout :: main-layout(~{::title}, ~{::#address-body})}">
<head>
  <title>Địa chỉ của tôi | GENTLE GLASSES</title>
</head>
<body>
<div id="address-body">
  <div class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom">
    <div>
      <h4 class="fw-800 text-uppercase mb-1" style="letter-spacing: -0.5px;">Địa chỉ nhận hàng</h4>
      <p class="text-muted small mb-0">Quản lý các địa điểm giao hàng của bạn.</p>
    </div>
    <button class="btn btn-black-sm shadow-sm" data-bs-toggle="modal" data-bs-target="#addAddressModal">
      <i class="bi bi-plus-lg me-2"></i> THÊM ĐỊA CHỈ
    </button>
  </div>

  <div th:if="${param.success}" class="alert alert-dark border-0 rounded-4 py-3 mb-4 small animate__animated animate__fadeIn">
    <i class="bi bi-check-circle-fill me-2 text-success"></i> Cập nhật địa chỉ thành công!
  </div>

  <div th:if="${#lists.isEmpty(addresses)}" class="text-center py-5 bg-light rounded-5 border border-dashed">
    <i class="bi bi-geo-alt text-muted" style="font-size: 3rem; opacity: 0.3;"></i>
    <p class="text-muted mt-3 fw-500">Bạn chưa có địa chỉ nào được lưu.</p>
  </div>

  <div class="address-list">
    <div th:each="addr : ${addresses}" class="address-card p-4 mb-3 border shadow-sm transition-all">
      <div class="d-flex justify-content-between align-items-start">
        <div class="flex-grow-1">
          <div class="d-flex align-items-center gap-2 mb-2">
            <span class="fw-800 text-uppercase" th:text="${addr.receiverName}">Hùng</span>
            <span class="badge-default-gentle" th:if="${addr.isDefault}">MẶC ĐỊNH</span>
          </div>

          <div class="info-row mb-1">
            <span class="text-muted small">Điện thoại:</span>
            <span class="small fw-600 ms-1" th:text="${addr.phone}">090...</span>
          </div>

          <div class="info-row mb-1">
            <span class="text-muted small">Địa chỉ:</span>
            <span class="small text-dark ms-1" th:text="${addr.detailAddress}">Số nhà...</span>
          </div>

          <div class="info-row">
            <span class="small text-secondary" th:text="${addr.ward + ', ' + addr.district + ', ' + addr.city}">Xã, Huyện, Tỉnh</span>
          </div>
        </div>

        <div class="text-end d-flex flex-column gap-2">
          <div class="d-flex gap-3 justify-content-end mb-2">
            <a href="#" class="action-link text-dark"><i class="bi bi-pencil-square me-1"></i> Sửa</a>
            <a th:if="${!addr.isDefault}" th:href="@{'/user/addresses/delete/' + ${addr.id}}"
               class="action-link text-danger" onclick="return confirm('Xóa địa chỉ này?')">
              <i class="bi bi-trash3 me-1"></i> Xóa
            </a>
          </div>

          <form th:if="${!addr.isDefault}" th:action="@{'/user/addresses/set-default/' + ${addr.id}}" method="post">
            <button type="submit" class="btn btn-outline-dark btn-xs rounded-pill px-3">
              Thiết lập mặc định
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addAddressModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <form th:action="@{/user/addresses/add}" method="post" class="modal-content border-0 shadow-lg rounded-5">
        <div class="modal-header border-0 px-4 pt-4">
          <h5 class="modal-title fw-800 text-uppercase">Địa chỉ mới</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="label-gentle">HỌ VÀ TÊN</label>
              <input type="text" name="receiverName" class="form-control custom-input" placeholder="Tên người nhận" required>
            </div>
            <div class="col-md-6">
              <label class="label-gentle">SỐ ĐIỆN THOẠI</label>
              <input type="text" name="phone" class="form-control custom-input" placeholder="090..." required>
            </div>
          </div>
          <div class="mb-3">
            <label class="label-gentle">TỈNH / THÀNH PHỐ</label>
            <input type="text" name="city" class="form-control custom-input" placeholder="Ví dụ: Hà Nội" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="label-gentle">QUẬN / HUYỆN</label>
              <input type="text" name="district" class="form-control custom-input" placeholder="..." required>
            </div>
            <div class="col-md-6">
              <label class="label-gentle">PHƯỜNG / XÃ</label>
              <input type="text" name="ward" class="form-control custom-input" placeholder="..." required>
            </div>
          </div>
          <div class="mb-3">
            <label class="label-gentle">ĐỊA CHỈ CỤ THỂ</label>
            <textarea name="detailAddress" class="form-control custom-input" rows="2" placeholder="Số nhà, tên đường..." required></textarea>
          </div>
          <div class="form-check custom-radio pt-2">
            <input class="form-check-input" type="checkbox" name="isDefault" id="isDefaultCheck">
            <label class="form-check-label small fw-600 text-muted" for="isDefaultCheck">
              Đặt làm địa chỉ mặc định
            </label>
          </div>
        </div>
        <div class="modal-footer border-0 px-4 pb-4">
          <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">HỦY BỎ</button>
          <button type="submit" class="btn btn-black rounded-pill px-4">HOÀN THÀNH</button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .fw-800 { font-weight: 800; }
  .fw-600 { font-weight: 600; }
  .fw-500 { font-weight: 500; }

  /* Address Card Style */
  .address-card {
    background: #fff;
    border-radius: 20px;
    border: 1.5px solid #f1f1f1 !important;
  }
  .address-card:hover {
    border-color: #000 !important;
    transform: translateY(-2px);
  }

  /* Badge Default */
  .badge-default-gentle {
    background: #000;
    color: #fff;
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }

  /* Action Links */
  .action-link {
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.2s;
  }
  .action-link:hover { opacity: 0.7; }

  /* Inputs & Labels */
  .label-gentle {
    font-size: 10px;
    font-weight: 700;
    color: #888;
    margin-bottom: 6px;
    display: block;
    letter-spacing: 0.5px;
  }
  .custom-input {
    border: 1.5px solid #eee;
    border-radius: 12px;
    padding: 10px 15px;
    font-size: 0.9rem;
  }
  .custom-input:focus {
    border-color: #000;
    box-shadow: none;
  }

  /* Buttons */
  .btn-black-sm {
    background: #000;
    color: #fff;
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.8rem;
    font-weight: 700;
    border: none;
  }
  .btn-black {
    background: #000;
    color: #fff;
    border: none;
    font-weight: 700;
  }
  .btn-black:hover { background: #333; color: #fff; }

  .btn-xs {
    font-size: 11px;
    padding: 4px 12px;
  }

  .custom-radio .form-check-input:checked {
    background-color: #000;
    border-color: #000;
  }
</style>
</body>
</html>
