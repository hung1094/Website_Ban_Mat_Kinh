<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Địa chỉ của tôi - GENTLE GLASSES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f5f5f5; }
    .address-card { border: none; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .address-item { border-bottom: 1px solid #f0f0f0; padding: 20px 0; }
    .address-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="row g-4">
    <div class="col-lg-3">... (copy sidebar của profile qua) ...</div>

    <div class="col-lg-9">
      <div class="card address-card p-4">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3">
          <h5 class="fw-bold mb-0">Địa chỉ của tôi</h5>
          <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#addAddressModal">
            <i class="bi bi-plus-lg"></i> Thêm địa chỉ mới
          </button>
        </div>

        <div th:if="${#lists.isEmpty(addresses)}" class="text-center py-5">
          <p class="text-muted">Bạn chưa có địa chỉ nào.</p>
        </div>

        <div th:each="addr : ${addresses}" class="address-item d-flex justify-content-between align-items-start">
          <div>
            <div class="mb-1">
              <span class="fw-bold me-2" th:text="${addr.receiverName}">Hùng</span>
              <span class="text-muted small border-start ps-2" th:text="${addr.phone}">090...</span>
            </div>
            <div class="text-muted small mb-1" th:text="${addr.detailAddress}">Số nhà...</div>
            <div class="text-muted small" th:text="${addr.ward + ', ' + addr.district + ', ' + addr.city}">Xã, Huyện, Tỉnh</div>
            <span th:if="${addr.isDefault}" class="badge border border-danger text-danger mt-2 fw-normal">Mặc định</span>
          </div>
          <div class="text-end">
            <button class="btn btn-link btn-sm text-primary text-decoration-none">Cập nhật</button><br>
            <button th:if="${!addr.isDefault}" class="btn btn-outline-secondary btn-sm mt-2">Thiết lập mặc định</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="addAddressModal" tabindex="-1">
  <div class="modal-dialog">
    <form th:action="@{/user/addresses/add}" method="post" class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Địa chỉ mới</h5>
      </div>
      <div class="modal-body">
        <div class="row g-2 mb-3">
          <div class="col-md-6"><input type="text" name="receiverName" class="form-control" placeholder="Họ và tên" required></div>
          <div class="col-md-6"><input type="text" name="phone" class="form-control" placeholder="Số điện thoại" required></div>
        </div>
        <input type="text" name="city" class="form-control mb-3" placeholder="Tỉnh/Thành phố" required>
        <input type="text" name="district" class="form-control mb-3" placeholder="Quận/Huyện" required>
        <input type="text" name="ward" class="form-control mb-3" placeholder="Phường/Xã" required>
        <textarea name="detailAddress" class="form-control mb-3" rows="2" placeholder="Địa chỉ cụ thể" required></textarea>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="isDefault" id="isDefaultCheck">
          <label class="form-check-label small text-muted" for="isDefaultCheck">Đặt làm địa chỉ mặc định</label>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Trở Lại</button>
        <button type="submit" class="btn btn-danger px-4">Hoàn thành</button>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
