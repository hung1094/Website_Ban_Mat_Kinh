<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/layout :: main-layout(~{::title}, ~{::#profile-body})}">
<head>
    <title>Hồ sơ cá nhân | GENTLE GLASSES</title>
</head>
<body>
<div id="profile-body">
    <div class="mb-5 pb-3 border-bottom">
        <h4 class="fw-800 text-uppercase mb-1" style="letter-spacing: -0.5px;">Thiết lập hồ sơ</h4>
        <p class="text-muted small mb-0">Quản lý thông tin cá nhân để trải nghiệm dịch vụ tốt nhất.</p>
    </div>

    <div th:if="${param.success}" class="alert alert-dark border-0 rounded-4 py-3 mb-4 small animate__animated animate__fadeIn">
        <i class="bi bi-check-circle-fill me-2 text-success"></i> Cập nhật hồ sơ thành công!
    </div>

    <form th:action="@{/user/profile/update}" method="post" class="row g-5 align-items-start">
        <div class="col-md-7 col-lg-8">
            <div class="mb-4 row align-items-center">
                <label class="col-sm-3 col-form-label text-muted text-md-end small text-uppercase fw-bold">Tên đăng nhập</label>
                <div class="col-sm-9 ps-md-4">
                    <p class="form-control-plaintext fw-800 fs-5 mb-0" th:text="${user.username}"></p>
                </div>
            </div>

            <div class="mb-4 row align-items-center">
                <label class="col-sm-3 col-form-label text-muted text-md-end small text-uppercase fw-bold">Họ và tên</label>
                <div class="col-sm-9 ps-md-4">
                    <input type="text" name="fullName" class="form-control custom-input" th:value="${user.fullName}" placeholder="Họ và tên của bạn">
                </div>
            </div>

            <div class="mb-4 row align-items-center">
                <label class="col-sm-3 col-form-label text-muted text-md-end small text-uppercase fw-bold">Địa chỉ Email</label>
                <div class="col-sm-9 ps-md-4">
                    <input type="email" name="email" class="form-control custom-input" th:value="${user.email}" placeholder="example@mail.com">
                </div>
            </div>

            <div class="mb-4 row align-items-center">
                <label class="col-sm-3 col-form-label text-muted text-md-end small text-uppercase fw-bold">Số điện thoại</label>
                <div class="col-sm-9 ps-md-4">
                    <input type="text" name="phoneNumber" class="form-control custom-input" th:value="${user.phoneNumber}" placeholder="090...">
                </div>
            </div>

            <div class="mb-4 row align-items-center">
                <label class="col-sm-3 col-form-label text-muted text-md-end small text-uppercase fw-bold">Giới tính</label>
                <div class="col-sm-9 ps-md-4">
                    <div class="d-flex gap-4">
                        <div class="form-check custom-radio">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="Nam" th:checked="${user.gender == 'Nam'}">
                            <label class="form-check-label fw-600" for="male">Nam</label>
                        </div>
                        <div class="form-check custom-radio">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="Nữ" th:checked="${user.gender == 'Nữ'}">
                            <label class="form-check-label fw-600" for="female">Nữ</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4 row align-items-center">
                <label class="col-sm-3 col-form-label text-muted text-md-end small text-uppercase fw-bold">Ngày sinh</label>
                <div class="col-sm-9 ps-md-4">
                    <input type="date" name="birthday" class="form-control custom-input" th:value="${user.birthday}">
                </div>
            </div>

            <div class="row mt-5">
                <div class="col-sm-9 offset-sm-3 ps-md-4">
                    <button type="submit" class="btn btn-black-lg px-5 shadow-sm">LƯU THAY ĐỔI</button>
                </div>
            </div>
        </div>

        <div class="col-md-5 col-lg-4 text-center border-start ps-lg-5">
            <div class="mb-4 d-flex flex-column align-items-center">
                <img th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                     id="previewImg"
                     width="120" height="120"
                     class="rounded-4 border shadow-sm mb-3"
                     style="object-fit: cover; border: 2px solid #fff !important;">

                <input type="file" id="fileAvatar" hidden accept=".jpg,.jpeg,.png">
                <button type="button" onclick="document.getElementById('fileAvatar').click()"
                        class="btn btn-outline-dark btn-sm rounded-pill px-4 fw-bold mb-3">
                    <i class="bi bi-camera me-2"></i> CHỌN ẢNH
                </button>

                <div class="text-muted" style="font-size: 10px; letter-spacing: 0.5px; line-height: 1.6;">
                    DUNG LƯỢNG TỐI ĐA 1 MB<br>ĐỊNH DẠNG: JPG, PNG
                </div>
            </div>
        </div>
    </form>
</div>

<style>
    .fw-800 { font-weight: 800; }
    .fw-600 { font-weight: 600; }

    /* Input Style */
    .custom-input {
        border: 1.5px solid #eeeeee;
        border-radius: 12px;
        padding: 12px 18px;
        transition: 0.3s ease;
        font-size: 0.95rem;
    }
    .custom-input:focus {
        border-color: #000;
        box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
        outline: none;
    }

    /* Radio Style */
    .custom-radio .form-check-input:checked {
        background-color: #000;
        border-color: #000;
    }

    /* Button Style */
    .btn-black-lg {
        background: #000;
        color: #fff;
        border: none;
        padding: 16px 40px;
        border-radius: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: 0.4s;
    }
    .btn-black-lg:hover {
        background: #333;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        color: #fff;
    }
</style>
</body>
</html>
