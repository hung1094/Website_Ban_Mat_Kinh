<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ của tôi - GENTLE GLASSES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f5f5f5; }
        .user-sidebar .list-group-item { border: none; padding: 12px 20px; }
        .user-sidebar .list-group-item.active { background-color: transparent; color: #ee4d2d; font-weight: bold; }
        .card-profile { border: none; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border-radius: 4px; }
        .avatar-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 2px solid #ddd; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="d-flex align-items-center mb-4 ps-2">
                <img th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="rounded-circle border" width="45" height="45">
                <div class="ms-3">
                    <div class="fw-bold small text-truncate" style="max-width: 150px;" th:text="${user.username}">Username</div>
                    <a href="#" class="text-muted small text-decoration-none"><i class="bi bi-pencil"></i> Sửa hồ sơ</a>
                </div>
            </div>
            <div class="list-group user-sidebar bg-transparent">
                <a th:href="@{/user/profile}" class="list-group-item list-group-item-action" th:classappend="${activePage == 'profile' ? 'active' : ''}">
                    <i class="bi bi-person me-2"></i> Hồ sơ
                </a>
                <a th:href="@{/user/addresses}" class="list-group-item list-group-item-action" th:classappend="${activePage == 'addresses' ? 'active' : ''}">
                    <i class="bi bi-geo-alt me-2"></i> Địa chỉ
                </a>
                <a th:href="@{/user/orders}" class="list-group-item list-group-item-action" th:classappend="${activePage == 'orders' ? 'active' : ''}">
                    <i class="bi bi-file-earmark-text me-2"></i> Đơn mua
                </a>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="card card-profile p-4">
                <div class="border-bottom pb-3">
                    <h5 class="fw-bold mb-1">Hồ sơ của tôi</h5>
                    <p class="text-muted small mb-0">Quản lý thông tin hồ sơ để bảo mật tài khoản</p>
                </div>

                <div th:if="${param.success}" class="alert alert-success mt-3 small py-2">Cập nhật hồ sơ thành công!</div>

                <form th:action="@{/user/profile/update}" method="post" class="mt-4 row g-4">
                    <div class="col-md-8">
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-muted text-end small">Tên đăng nhập</label>
                            <div class="col-sm-9"><p class="form-control-plaintext fw-bold" th:text="${user.username}"></p></div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-3 col-form-label text-muted text-end small">Họ và tên</label>
                            <div class="col-sm-9"><input type="text" name="fullName" class="form-control form-control-sm" th:value="${user.fullName}"></div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-3 col-form-label text-muted text-end small">Email</label>
                            <div class="col-sm-9"><input type="email" name="email" class="form-control form-control-sm" th:value="${user.email}"></div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-3 col-form-label text-muted text-end small">Số điện thoại</label>
                            <div class="col-sm-9"><input type="text" name="phoneNumber" class="form-control form-control-sm" th:value="${user.phoneNumber}"></div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-3 col-form-label text-muted text-end small">Giới tính</label>
                            <div class="col-sm-9">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="Nam" th:checked="${user.gender == 'Nam'}">
                                    <label class="form-check-label" for="male">Nam</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="Nữ" th:checked="${user.gender == 'Nữ'}">
                                    <label class="form-check-label" for="female">Nữ</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-3 col-form-label text-muted text-end small">Ngày sinh</label>
                            <div class="col-sm-9"><input type="date" name="birthday" class="form-control form-control-sm" th:value="${user.birthday}"></div>
                        </div>
                        <div class="row mt-4">
                            <div class="col-sm-9 offset-sm-3">
                                <button type="submit" class="btn btn-danger px-4 shadow-sm">Lưu</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 text-center border-start">
                        <img th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="avatar-preview mb-3">
                        <input type="file" id="fileAvatar" hidden accept=".jpg,.jpeg,.png">
                        <button type="button" onclick="document.getElementById('fileAvatar').click()" class="btn btn-outline-secondary btn-sm d-block mx-auto mb-2">Chọn ảnh</button>
                        <div class="text-muted small">Dụng lượng tối đa 1 MB<br>Định dạng: .JPG, .PNG</div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
